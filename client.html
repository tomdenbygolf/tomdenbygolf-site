<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1824">
<title>Client Login — Tom Denby Golf</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@1,400&family=Barlow:wght@300;400;500;600;700&display=swap');
:root{--navy:#1a2640;--navy-deep:#0f1824;--navy-mid:#243350;--green:#3a6b4a;--green-bright:#5daa74;--tan:#c9a96e;--tan-light:#dfc18f;--cream:#f5ead8;--red:#c0392b}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy-deep);color:var(--cream);font-family:'Barlow',sans-serif;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(201,169,110,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,169,110,0.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none}
.glow{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(58,107,74,0.15) 0%,transparent 70%);pointer-events:none}
.card{background:var(--navy);border:2px solid rgba(201,169,110,0.3);border-radius:20px;padding:40px 32px;width:100%;max-width:400px;position:relative;overflow:hidden;animation:fadeUp .6s ease both}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--tan),var(--green-bright),var(--tan))}
.logo-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:32px}
.logo-circle{width:64px;height:64px;background:var(--tan);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--navy-deep);box-shadow:0 4px 24px rgba(201,169,110,0.3)}
.logo-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:var(--cream)}
.logo-sub{font-size:10px;letter-spacing:2px;color:var(--tan);text-transform:uppercase}
.welcome-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--cream);margin-bottom:6px;text-align:center}
.welcome-sub{font-size:13px;color:rgba(245,234,216,0.55);line-height:1.6;text-align:center;margin-bottom:24px}
.form-group{margin-bottom:14px}
.form-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tan);display:block;margin-bottom:6px}
.form-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(201,169,110,0.25);border-radius:10px;color:var(--cream);font-family:'Barlow',sans-serif;font-size:15px;padding:14px 16px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.form-input::placeholder{color:rgba(245,234,216,0.3)}
.form-input:focus{border-color:var(--tan);background:rgba(255,255,255,0.07)}
.form-input.error{border-color:var(--red)}
.btn-login{width:100%;background:linear-gradient(135deg,var(--tan),var(--tan-light));color:var(--navy-deep);border:none;border-radius:10px;padding:16px;font-family:'Barlow',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:6px;box-shadow:0 4px 20px rgba(201,169,110,0.2)}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(201,169,110,0.35)}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none}
.error-msg{background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.4);border-radius:8px;padding:10px 14px;font-size:12px;color:#e74c3c;margin-top:12px;display:none;text-align:center}
.error-msg.show{display:block}
.back-link{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:20px;color:rgba(245,234,216,0.4);font-size:12px;text-decoration:none;transition:color .2s}
.back-link:hover{color:var(--tan)}
.footer-brand{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-family:'Bebas Neue',sans-serif;letter-spacing:3px;font-size:10px;color:rgba(201,169,110,0.2);white-space:nowrap}
.loading{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:var(--navy-deep);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="glow"></div>
<div class="card">
  <div class="logo-wrap">
    <div class="logo-circle">TDG</div>
    <div class="logo-name">Tom Denby Golf</div>
    <div class="logo-sub">Client Portal</div>
  </div>
  <div class="welcome-title">Welcome Back</div>
  <div class="welcome-sub">Enter your name and the password Tom sent you to access your coaching dashboard.</div>
  <div class="form-group">
    <label class="form-label">Your Name</label>
    <input class="form-input" id="clientName" type="text" placeholder="e.g. James Murphy" autocomplete="name">
  </div>
  <div class="form-group">
    <label class="form-label">Your Password</label>
    <input class="form-input" id="clientPass" type="password" placeholder="Password from your coach" autocomplete="current-password">
  </div>
  <button class="btn-login" id="loginBtn" onclick="handleLogin()">Access My Dashboard →</button>
  <div class="error-msg" id="errorMsg">Incorrect password. Please check the details Tom sent you.</div>
  <a href="index.html" class="back-link">← Back to tomdenbygolf.co.uk</a>
</div>
<div class="footer-brand">REAL LIFE METHOD™ · TOM DENBY GOLF</div>

<script>
const SUPABASE_URL = 'https://lvbglsakwomjnkfdftdr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2Ymdsc2Frd29tam5rZmRmdGRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTczOTUsImV4cCI6MjA4OTEzMzM5NX0.r01j4YVytdW7GI-75kSj-51neBvWGWr_36ku8OLHUR8';

async function handleLogin() {
  const nameInput = document.getElementById('clientName').value.trim();
  const pass = document.getElementById('clientPass').value.trim();
  const errEl = document.getElementById('errorMsg');
  const btn = document.getElementById('loginBtn');

  if (!nameInput || !pass) { errEl.textContent='Please enter both your name and password.'; errEl.classList.add('show'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span>Checking…';
  errEl.classList.remove('show');

  try {
    // Query Supabase for a student with this password
    const res = await fetch(`${SUPABASE_URL}/rest/v1/students?password=eq.${encodeURIComponent(pass)}&select=id,first_name,last_name,email,handicap,password`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const students = await res.json();

    if (students && students.length > 0) {
      const student = students[0];
      // Store session
      sessionStorage.setItem('tdg_client_session', JSON.stringify({
        id: student.id, name: student.first_name + ' ' + student.last_name,
        firstName: student.first_name, email: student.email,
        handicap: student.handicap, loggedIn: true
      }));
      window.location.href = 'dashboard.html?client=' + student.id;
    } else {
      errEl.textContent = 'Incorrect password. Please check the details Tom sent you.';
      errEl.classList.add('show');
      document.getElementById('clientPass').value = '';
      document.getElementById('clientPass').focus();
    }
  } catch(e) {
    errEl.textContent = 'Connection error. Please try again.';
    errEl.classList.add('show');
  }

  btn.disabled = false;
  btn.innerHTML = 'Access My Dashboard →';
}

document.getElementById('clientPass').addEventListener('keydown', e => { if(e.key==='Enter') handleLogin(); });
document.getElementById('clientName').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('clientPass').focus(); });
</script>
</body>
</html>
